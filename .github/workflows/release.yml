name: Release
true:
  push:
    tags:
    - v*
jobs:
  build:
    name: Build and Test
    runs-on:
    - self-hosted
    - linux
    - x64
    - hetzner
    - qrcom
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: pnpm
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Typecheck
      run: pnpm typecheck
    - name: Run tests
      run: pnpm test
    - name: Build
      run: pnpm build
  publish:
    name: Publish to npm
    needs: build
    runs-on:
    - self-hosted
    - linux
    - x64
    - hetzner
    - qrcom
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: https://registry.npmjs.org
        cache: pnpm
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Build
      run: pnpm build
    - name: Publish to npm
      run: npm publish --access public --provenance=false
  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on:
    - self-hosted
    - linux
    - x64
    - hetzner
    - qrcom
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Extract version from tag
      id: version
      env:
        GH_REF: ${{ github.ref }}
      run: |
        VERSION="${GH_REF#refs/tags/v}"
        TAG="${GH_REF#refs/tags/}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
    - name: Extract release notes from CHANGELOG
      id: changelog
      env:
        RELEASE_VERSION: ${{ steps.version.outputs.version }}
      run: |
        NOTES=$(awk "/^## \[$RELEASE_VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
        if [ -z "$NOTES" ]; then
          NOTES="Release $RELEASE_VERSION"
        fi
        echo "$NOTES" > release_notes.md
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Withallo SDK JS v${{ steps.version.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
